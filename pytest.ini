[pytest]

# ── Test Discovery ─────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── HTML Report (auto-generated after every run) ───────────────
addopts =
    --html=reports/report.html
    --self-contained-html
    --tb=short
    -v

# ── Markers (avoids PytestUnknownMarkWarning) ──────────────────
markers =
    smoke: Quick sanity check tests (run before full suite)
    regression: Full regression suite
    negative: Negative / invalid input tests
    boundary: Boundary value tests
    ui: UI / front-end tests

# ── Logging (captured and shown in report) ────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# ── Timeout (fail a test if it hangs beyond 60 seconds) ───────
# Requires: pip install pytest-timeout
timeout = 60

# ── Console Output ────────────────────────────────────────────
console_output_style = progress